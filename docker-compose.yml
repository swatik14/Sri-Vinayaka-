version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: temple_mysql
    environment:
      MYSQL_ROOT_PASSWORD: temple_root_pass
      MYSQL_DATABASE: vinayaka_temple
      MYSQL_USER: temple_user
      MYSQL_PASSWORD: temple_pass
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: temple_backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: temple_user
      DB_PASSWORD: temple_pass
      DB_NAME: vinayaka_temple
      JWT_SECRET: your_jwt_secret_change_in_production
      FRONTEND_URL: http://localhost:3000
    ports:
      - '5000:5000'
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: temple_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  mysql_data:
